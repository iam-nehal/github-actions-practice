name: git hosted runners

on:
  push:
  workflow_dispatch:

jobs:
  
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: OS name
        run: echo "Runner OS name is $RUNNER_OS"
      - name: show runner hostname
        run: hostname
      - name: show current user
        run: whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: OS name
        run: echo "Runner OS name is $env:RUNNER_OS"
      - name: show runner hostname
        run: hostname
      - name: show current user
        run: whoami
        
  macos-job:
    runs-on: macos-latest
    steps:
      - name: OS name
        run: echo "Runner OS name is $RUNNER_OS"
      - name: show runner hostname
        run: hostname
      - name: show current user
        run: whoami
        
        
    
