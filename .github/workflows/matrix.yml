name: Python Matrix

on:
    workflow_dispatch:

jobs:
    build:

      strategy:
        fail-fast: true
        matrix:
          os: [ubuntu-latest, windows-latest]
          python-version: ["3.1","3.11","3.12"]
        #   exclude:
        #     - os: windows-latest
        #       python-version: 3.10

      runs-on: ${{ matrix.os}}
      
      steps:
        - name: Code Checkout
          uses: actions/checkout@v4

        - name: setup python ${{ matrix.python-version}}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ matrix.python-version}}

        - name: print python version
          run: python --version

