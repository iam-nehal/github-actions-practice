name: Manual workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: select environment name (main or feature-pr-test)
        required: true
        type: choice
        options:
          - main
          - feature-pr-test

jobs:
  manual-job:
    runs-on: ubuntu-latest
    steps:
      - name: show selected environment
        run: echo "Workflow run in environment:${{ github.event.inputs.environment}}"          