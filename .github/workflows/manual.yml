name: Manual workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: select environment name (staging or production)
        required: true
        type: choice
        options:
          - production
          - staging

jobs:
  manual-job:
    runs-on: ubuntu-latest
    steps:
      - name: show selected environment
        run: echo "Workflow run in environment:${{ github.event.inputs.environment}}"          